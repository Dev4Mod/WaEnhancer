name: Bump Supported WA Version & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of versionName to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - none

jobs:
  bump-and-release:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest WhatsApp version
        id: wa
        run: |
          set -e
          VERSION=$(curl -fsSL "https://ws75.aptoide.com/api/7/app/getMeta/package_name/com.whatsapp" | jq -r '.data.file.vername')
          [ -n "$VERSION" ] && [ "$VERSION" != "null" ]
          PREFIX=$(echo "$VERSION" | cut -d. -f1-3)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Add version to supported arrays
        run: |
          set -e
          FILE=app/src/main/res/values/arrays.xml
          ITEM="${{ steps.wa.outputs.prefix }}.xx"

          add_item () {
            local array_name="$1"
            if grep -q "<item>${ITEM}</item>" "$FILE"; then
              return
            fi
            local s e
            s=$(grep -n "<string-array name=\"${array_name}\">" "$FILE" | cut -d: -f1 | head -1)
            e=$(tail -n +"$s" "$FILE" | grep -n "</string-array>" | cut -d: -f1 | head -1)
            e=$((s+e-1))
            sed -i "${e}i\\        <item>${ITEM}</item>" "$FILE"
          }

          add_item supported_versions_wpp
          add_item supported_versions_business

      - name: Bump versionCode / versionName
        id: bumpver
        run: |
          set -e
          FILE=app/build.gradle.kts
          CUR_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$FILE")
          CUR_NAME=$(sed -n 's/.*versionName = "\([^ ]*\).*/\1/p' "$FILE")
          NEW_CODE=$((CUR_CODE+1))
          IFS='.' read -r MAJ MIN PATCH <<< "$CUR_NAME"
          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH+1));;
            minor) MIN=$((MIN+1)); PATCH=0;;
            none) ;;
          esac
          NEW_NAME="$MAJ.$MIN.$PATCH"
          sed -i "s/versionCode = ${CUR_CODE}/versionCode = ${NEW_CODE}/" "$FILE"
          sed -i "s/versionName = \"${CUR_NAME} (\$gitHash)\"/versionName = \"${NEW_NAME} (\$gitHash)\"/" "$FILE"
          echo "new_name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add app/src/main/res/values/arrays.xml app/build.gradle.kts
          git commit -m "chore: support WA ${{ steps.wa.outputs.prefix }} / bump to ${{ steps.bumpver.outputs.new_name }}" || exit 0
          git push

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: Build
        run: ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true

      - name: Tag
        id: tag
        run: |
          echo "tag=${{ steps.bumpver.outputs.new_name }}-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: WaEnhancer ${{ steps.bumpver.outputs.new_name }}
          body: |
            Adds support for WhatsApp ${{ steps.wa.outputs.prefix }}.xx
          files: |
            app/build/outputs/apk/whatsapp/debug/WaEnhancer*.apk
            app/build/outputs/apk/business/debug/WaEnhancer-Business*.apk
