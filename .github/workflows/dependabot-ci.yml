name: Dependabot CI

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build WhatsApp Debug
        run: ./gradlew assembleWhatsappDebug