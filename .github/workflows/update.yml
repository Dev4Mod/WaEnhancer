name: bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of versionName to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - none

jobs:
  bump-and-release:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest WhatsApp version
        id: wa
        run: |
          set -e

          echo "::group::Fetching latest WhatsApp version"

          VERSION=$(curl -fsSL "https://ws75.aptoide.com/api/7/app/getMeta/package_name/com.whatsapp" | jq -r '.data.file.vername')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest WhatsApp version"
            exit 1
          fi

          PREFIX=$(echo "$VERSION" | cut -d. -f1-3)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

          echo "::notice title=Latest WhatsApp Version::$VERSION"
          echo "::notice title=Supported Prefix::${PREFIX}.xx"

          echo "::endgroup::"

      - name: Add version to supported arrays
        run: |
          set -e
          FILE=app/src/main/res/values/arrays.xml
          ITEM="${{ steps.wa.outputs.prefix }}.xx"

          add_item () {
            local array_name="$1"
            if grep -q "<item>${ITEM}</item>" "$FILE"; then
              return
            fi
            local s e
            s=$(grep -n "<string-array name=\"${array_name}\">" "$FILE" | cut -d: -f1 | head -1)
            e=$(tail -n +"$s" "$FILE" | grep -n "</string-array>" | cut -d: -f1 | head -1)
            e=$((s+e-1))
            sed -i "${e}i\\        <item>${ITEM}</item>" "$FILE"
          }

          add_item supported_versions_wpp
          add_item supported_versions_business

      - name: Show supported version
        run: |
          echo "::notice title=WhatsApp::${{ steps.wa.outputs.version }}"
          echo "::notice title=Prefix::${{ steps.wa.outputs.prefix }}.xx"

      - name: Bump versionCode / versionName
        id: bumpver
        run: |
          set -e
          FILE=app/build.gradle.kts

          CUR_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$FILE")
          if [ -z "$CUR_CODE" ]; then
            echo "::error::Failed to parse current versionCode from $FILE"
            exit 1
          fi

          # Extract only the numeric X.Y.Z version, regardless of what follows
          # the closing quote (e.g. "1.7.0 (${gitHash})" or "1.7.0 ($gitHash)").
          CUR_NAME=$(grep -oP 'versionName\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1)
          if [ -z "$CUR_NAME" ]; then
            echo "::error::Failed to parse current versionName from $FILE"
            exit 1
          fi

          NEW_CODE=$((CUR_CODE+1))

          IFS='.' read -r MAJ MIN PATCH <<< "$CUR_NAME"
          MAJ=${MAJ:-0}
          MIN=${MIN:-0}
          PATCH=${PATCH:-0}

          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH+1));;
            minor) MIN=$((MIN+1)); PATCH=0;;
            none) ;;
          esac

          NEW_NAME="$MAJ.$MIN.$PATCH"

          # Sanity check before mutating files / creating a release tag.
          if ! [[ "$NEW_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Computed invalid new version name: '$NEW_NAME'"
            exit 1
          fi

          sed -i "s/versionCode = ${CUR_CODE}/versionCode = ${NEW_CODE}/" "$FILE"

          # Replace only the numeric part of versionName, keeping whatever
          # suffix (e.g. " (${gitHash})" or " ($gitHash)") already follows it.
          sed -i "s/versionName = \"${CUR_NAME}/versionName = \"${NEW_NAME}/" "$FILE"

          echo "new_name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Version summary
        run: |
          echo "WhatsApp Version : ${{ steps.wa.outputs.version }}"
          echo "Supported Prefix : ${{ steps.wa.outputs.prefix }}.xx"
          echo "App Version : ${{ steps.bumpver.outputs.new_name }}"
          echo "::notice title=Release Version::${{ steps.bumpver.outputs.new_name }}"

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add app/src/main/res/values/arrays.xml app/build.gradle.kts
          git commit -m "chore: support WA ${{ steps.wa.outputs.prefix }} / bump to ${{ steps.bumpver.outputs.new_name }}" || exit 0
          git push

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: Build info
        run: |
          echo "::group::Build Information"
          echo "WhatsApp : ${{ steps.wa.outputs.version }}"
          echo "Prefix   : ${{ steps.wa.outputs.prefix }}.xx"
          echo "Release  : ${{ steps.bumpver.outputs.new_name }}"
          echo "::endgroup::"

      - name: Build
        run: ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true

      - name: Tag
        id: tag
        run: |
          set -e
          NEW_NAME="${{ steps.bumpver.outputs.new_name }}"
          if ! [[ "$NEW_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Refusing to create tag from invalid version name: '$NEW_NAME'"
            exit 1
          fi
          echo "tag=${NEW_NAME}-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: WaEnhancer ${{ steps.bumpver.outputs.new_name }}
          body: |
            Adds support for WhatsApp ${{ steps.wa.outputs.prefix }}.xx
          files: |
            app/build/outputs/apk/whatsapp/debug/WaEnhancer*.apk
            app/build/outputs/apk/business/debug/WaEnhancer-Business*.apk
