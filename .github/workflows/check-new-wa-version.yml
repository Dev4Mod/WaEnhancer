name: Check for New WhatsApp Version

# Purely informational: opens/updates a tracking issue when a WhatsApp
# version shows up that isn't in our supported_versions_wpp list yet.
# It never edits code or triggers a build — use bump-wa-version.yml for
# that once you've manually confirmed the new version actually works.
on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch: {}

jobs:
  check-version:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest WhatsApp version from APKMirror
        id: latest
        run: |
          set -e
          PAGE=$(curl -s -A "Mozilla/5.0" "https://www.apkmirror.com/apk/whatsapp-inc/whatsapp/")
          # First "variant" link on the listing page's title contains the version, e.g. "WhatsApp 2.26.27.85"
          LATEST=$(echo "$PAGE" | grep -oE 'WhatsApp [0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | awk '{print $2}')
          if [ -z "$LATEST" ]; then
            echo "Could not parse latest version, skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "prefix=$(echo "$LATEST" | cut -d. -f1-3)" >> "$GITHUB_OUTPUT"

      - name: Compare against supported list
        id: compare
        if: steps.latest.outputs.found == 'true'
        run: |
          PREFIX="${{ steps.latest.outputs.prefix }}.xx"
          if grep -q "<item>${PREFIX}</item>" app/src/main/res/values/arrays.xml; then
            echo "already_supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_supported=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open tracking issue
        if: steps.latest.outputs.found == 'true' && steps.compare.outputs.already_supported == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const version = "${{ steps.latest.outputs.latest }}";
            const title = `New WhatsApp version detected: ${version}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-wa-version'
            });
            if (existing.some(i => i.title === title)) {
              console.log('Issue already open, skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['new-wa-version'],
              body: [
                `WhatsApp **${version}** is out and not yet in \`supported_versions_wpp\`.`,
                '',
                '**Next steps:**',
                '1. Sideload it on a test device with this fork and check Xposed/Logcat for hook failures.',
                '2. If everything still resolves cleanly, run the **Bump Supported WA Version & Release** workflow with:',
                `   - \`wa_version\`: \`${version.split('.').slice(0,3).join('.')}\``,
                '3. If hooks broke, fix the DexKit signatures in `Unobfuscator.kt` first, then run the bump workflow.'
              ].join('\n')
            });
